<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>label태그안에 input태그 작성하는 방법</p>
    <label>아이디(6자 이상)<input type="text"></label><hr>
    <p>따로 사용후 묶는 방법</p>
    <label for="user_id">아이디 (6자 이상)</label>
    <input type="text" name="id" id="user_id">
    <!-- user_id 값을 동일하게 설정해야 연결됨. -->
</body>
</html>
