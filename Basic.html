<!-- H(Hyper)T(Text)M(Markup)L(Language) -->



<!DOCTYPE html>
<!-- 현재 문서가 HTML5 언어로 작성한 웹 문서라는 뜻 -->
<html lang="ko">
<!-- <html> 태그는 웹 문서가 시작된다는 뜻이고 </html> 태그는 웹 문서가 끝났다는 뜻 -->
<!-- </html> 태그 뒤에는 아무 내용도 없어야함. -->
<!-- lang="ko" 검색 사이트에서 특정 언어로 제한해 검색할 때 필요함. -->
<!-- 또한 화면 낭독기에서 웹 문서를 소리내어 읽어 줄 때 해당 언어에 맞추어 발음이나 억양, 목소리 등 다르게 할 수 있음. -->
<head>
<!-- <head>영역의 내용은 대부분 웹 브라우저 화면에 보이지 않음. 또한 문서에 사용할 스타일 시트 파일도 이곳에서 연결. -->
    <meta charset="UTF-8">
    <!-- 인코딩을 명시하지않으면 웹 브라우저에서 자동으로 인코딩을 처리하기 때문에 한글이 깨질 수도 있음. 꼭 적어주는것이 좋음 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 문서 연습</title>
    <!-- 웹문서의 제목 -->
</head>
<body>
    <!-- <body>와 <body> 사이에 실제 웹 브라우저에 표시할 내용을 입력 -->
        <!-- /body를 쓰니까 주석이 풀림 -->
     <h1>웹 문서 만들기</h1>
</body>
</html>
