<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 연습</title>
</head>
<body>
    <h1>레드향</h1>
    <!-- h는 제목을 뜻하는 heading의 줄임말 1~6의 숫자로 제목 텍스르를 크기별로 표시가능 -->
    <p>껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다.</p>
    <!-- b태그는 시각적으로 굵게 표시만 할 텍스트 -->
    <p>레드향은 한라봉과 귤을 교배한 것으로 <br>
        일반 귤 보다 2~3배 크고, 과육이 붉고 통통하다.
    </p>
    <!-- 텍스트 단락을 만드는 P 태그, 줄을 바꾸는 br 태그 -->
    <blockquote>비타민 C와 비타민 P가 풍부해 <strong>혈액 순환, 감기예방</strong> 등에 좋은 것으로 알려져 있다.</blockquote>
    <!-- blockquote는 인용문을 쓸때 사용 다른 텍스트보다 안으로 들여 쓴 상태가 됨. -->
    <!-- strong태그는 b태그처럼 굵게 표시가 되지만 경고나 주의사항 처럼 내용을 강조하는 부분에 사용하고 화면낭독기가 강조해서 읽어줌. -->
    <em>이탤릭체로 강조할 텍스트</em><br>
    <!-- 문장에서 흐름상 특정 부분을 강조하고 싶은 부분 -->
    <i>이탤릭체로 표시할 텍스트</i><br>
    <!-- 마음속의 생각이나 용어, 관용구 등에 사용, 단순히 다른 텍스트와 구별하기 위해 -->
    <abbr title="Internet of Things">IOT</abbr><br>
    <!-- 줄임말을 표시함 마우스를 올리면 타이틀 안에 글이 뜸 -->
     <p>안녕하세요 -명언, <cite>임승택</cite></p><br>
     <!-- 웹 문서나 포스트에서 참고 내용 표시 -->
    <p>가격: 13,000원<small>(부가세 별도)</small></p><br>
    <!-- 부가 정보처럼 작게 표시해도 되는 텍스트 -->
    <p>물의 화학식은 H<sub>2</sub>O입니다</p><br>
    <!-- 아래 첨자 -->
    <p>E = mc<sup>2</sup></p><br>
    <!-- 위 첨자 -->
    <p><s>34,000원</s>19,000원</p><br>
    <!-- 취소선을 표시 -->
    <u>텍스트에 단순히 밑줄 긋기</u><br>
    <ins>새로운 내용 삽입</ins><br>
    <del>기존 내용 삭제</del>
    <h2>레드향 샐러드 레시피</h2>
    <h2>상품구성</h2>
   
</body>
</html>
