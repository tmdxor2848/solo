<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오디오</title>
    <style>
    table {
        border-collapse: collapse; /* 선 겹침 제거 */
        width: 60%;
    }

    th, td {
        border: 1px solid rgb(100, 100, 100);   /* 칸마다 선 */
        padding: 8px;
        text-align: center;
    }

    caption {
        font-weight: bold;
        margin-bottom: 10px;
    }
</style>
</head>
<body>
    <audio src="medias/마크툽 (MAKTUB)-01-시작의 아이.mp3" controls preload="none"></audio>
    <!-- <audio src="오디오파일경로" controls="controls" preload="다운로드여부"/> -->
     <table>
        <caption>audio와 video태그의 속성</caption>
        <tr>
            <th>종류</th>
            <th>속성</th>
        </tr>
        <tr>
            <td>controls</td>
            <td>플레이어 화면에 컨트롤 바를 표시</td>
        </tr>
        <tr>
            <td>autoplay</td>
            <td>오디오나 비디오를 자동으로 실행</td>
        </tr>
        <tr>
            <td>loop</td>
            <td>오디오나 비디오를 반복 재생</td>
        </tr>
        <tr>
            <td>muted</td>
            <td>오디오나 비디오의 소리를 제거</td>
        </tr>
        <tr>
            <td>preload</td>
            <td>페이지를 불러올 때 오디오나 비디오 파일을 어떻게 로딩할 것인지 지정. 기본값은 auto</td>
        </tr>
        <tr>
            <td>width, height</td>
            <td>너비와 높이를 지정</td>
        </tr>
        <tr>
            <td>poster="파일 이름"</td>
            <td>video태그에서 사용하는 속성으로 비디오가 재생되기 전까지 화면에 표시될 포스터 이미지를 지정</td>
        </tr>
     </table>
</body>
</html>
