<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문서</title>
  <style>
  #주문서 {
    border: 2px solid black;
    padding: 20px;
    width: 400px;
  }
</style>
</head>
<body>
   <h1>레드향 주문하기</h1>

<fieldset>
  <legend>상품 선택</legend>

  <h3>주문할 상품을 선택해 주세요</h3>

  <p>
    <input type="checkbox" name="order" value="gift_3kg">
    선물용 3KG
    <input type="number" name="gift_3kg_count" max="5" min="0" value="0"
           oninput="this.value = Math.min(this.value, 5)">개
    <small>(최대 5개)</small>
  </p>

  <p>
    <input type="checkbox" name="order" value="gift_5kg">
    선물용 5KG
    <input type="number" name="gift_5kg_count" max="3" min="0" value="0"
           oninput="this.value = Math.min(this.value, 3)">개
    <small>(최대 3개)</small>
  </p>

  <p>
    <input type="checkbox" name="order" value="home_3kg">
    가정용 3KG
    <input type="number" name="home_3kg_count" max="5" min="0" value="0"
           oninput="this.value = Math.min(this.value, 5)">개
    <small>(최대 5개)</small>
  </p>

  <p>
    <input type="checkbox" name="order" value="home_5kg">
    가정용 5KG
    <input type="number" name="home_5kg_count" max="3" min="0" value="0"
           oninput="this.value = Math.min(this.value, 3)">개
    <small>(최대 3개)</small>
  </p>
  <h3>포장 선택</h3>
  <input type="radio" name="packaging" value="yes" checked>선물 포장<br>
  <input type="radio" name="packaging" value="no">선물 포장 안함

</fieldset>
</body>
</html>
